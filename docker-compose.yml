services:
  stockagent:
    build:
      context: .
      dockerfile: Dockerfile
    image: stockagent:local
    container_name: stockagent_app
    ports:
      - "8501:8501"
    env_file:
      # Copy .env.example → .env and fill in your keys before running.
      - .env
    volumes:
      # Persist analysis outputs across container restarts
      - stockagent_outputs:/src/outputs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  stockagent_outputs:
    driver: local
