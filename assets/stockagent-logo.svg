<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Chart icon -->
  <rect x="20" y="100" width="18" height="60" rx="4" fill="url(#accent)" opacity="0.5"/>
  <rect x="46" y="70" width="18" height="90" rx="4" fill="url(#accent)" opacity="0.7"/>
  <rect x="72" y="40" width="18" height="120" rx="4" fill="url(#accent)" opacity="0.85"/>
  <rect x="98" y="55" width="18" height="105" rx="4" fill="url(#accent)"/>
  <!-- Trend line -->
  <polyline points="29,95 55,65 81,35 107,50" stroke="#0f172a" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="107" cy="50" r="5" fill="#0f172a"/>

  <!-- "Stock" text -->
  <text x="140" y="115" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="url(#grad)" letter-spacing="-2">
    Stock
  </text>

  <!-- "Agent" text -->
  <text x="390" y="115" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="72" font-weight="300" fill="url(#grad)" letter-spacing="-1">
    Agent
  </text>

  <!-- Tagline -->
  <text x="140" y="148" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="16" fill="#64748b" letter-spacing="3">
    AI-POWERED MULTI-AGENT INVESTMENT INTELLIGENCE
  </text>
</svg>
